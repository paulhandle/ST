# PerformanceProtocol Web — fly.io config
# Org: performance-protocol
# Region: Singapore (sin)

app = "pp-web"
primary_region = "sin"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # BACKEND_URL is baked at build time via --build-arg, but exposing it at runtime
  # too lets us override without a rebuild for emergency hot-fixes.
  BACKEND_URL = "https://api.performanceprotocol.io"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
