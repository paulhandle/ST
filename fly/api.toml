# PerformanceProtocol API — fly.io config
# Org: performance-protocol
# Region: Singapore (sin)

app = "st-api"
primary_region = "sin"

[deploy]
  release_command = "alembic upgrade head"
  strategy = "rolling"

[env]
  PORT = "8000"
  COROS_AUTOMATION_MODE = "real"
  # PYTHONPATH already set inside the image

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
